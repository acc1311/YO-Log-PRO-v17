name: Build YO Log PRO v17

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.8.10 (Windows 7 compatible)
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2
          pip install pyserial==3.5

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile ^
            --windowed ^
            --name "YO_Log_PRO_v17" ^
            --icon "icon.ico" ^
            --add-data "contests.json;." ^
            --add-data "config.json;." ^
            --hidden-import serial ^
            --hidden-import serial.tools ^
            --hidden-import serial.tools.list_ports ^
            yo_log_pro.py
        shell: cmd

      - name: Verify build
        run: |
          dir dist\
          echo Build completed successfully!
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YO_Log_PRO_v17_Win7
          path: dist\YO_Log_PRO_v17.exe
          retention-days: 30

      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v17.0-${{ github.run_number }}
          name: "YO Log PRO v17.0 — CAT + Win7 Build #${{ github.run_number }}"
          body: |
            ## YO Log PRO v17.0 - CAT Edition

            ### Compatibil: Windows 7 SP1 / 8 / 10 / 11 (32 & 64 bit)
            ### Build: Python 3.8.10 + PyInstaller 5.13.2

            ### NOU in v17:
            - CAT bidirectional: Yaesu / Icom CI-V / Kenwood / Elecraft / Hamlib
            - Log Nou cu nume personalizat
            - 6 teme predefinite + editor culori custom
            - Timer cu avertizari sonore (5min, 1min, final)

            ### Instalare:
            1. Descarca YO_Log_PRO_v17.exe
            2. Pune-l intr-un folder dedicat (ex: C:\YOLog\)
            3. Ruleaza direct - nu necesita instalare Python

            Windows 7: Instaleaza vcredist_x64.exe daca apare eroare DLL
            https://aka.ms/vs/17/release/vc_redist.x64.exe
          draft: false
          prerelease: false
          files: dist/YO_Log_PRO_v17.exe
